name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            rlystate-backend/package-lock.json
            rlystate-frontend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: rlystate-backend

      - name: Install frontend dependencies
        run: npm ci
        working-directory: rlystate-frontend

      - name: Generate Prisma client
        run: npx prisma generate
        working-directory: rlystate-backend

      - name: Backend TypeScript check
        run: npx tsc --noEmit
        working-directory: rlystate-backend

      - name: Frontend TypeScript check
        run: npx tsc -b --noEmit
        working-directory: rlystate-frontend

      - name: Backend lint
        run: npm run lint
        working-directory: rlystate-backend

      - name: Frontend lint
        run: npm run lint
        working-directory: rlystate-frontend
